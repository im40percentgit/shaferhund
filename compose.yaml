# Shaferhund — Wazuh Manager + Alert Triage Agent + Suricata NIDS
# Wazuh 4.x Manager only (no OpenSearch, no indexer, no dashboard).
# Alerts written to mounted volume, tailed by shaferhund-agent.
# Suricata 7 runs in pcap-read mode fed by tcpreplay (no live NIC tap).
#
# @decision DEC-SURICATA-001
# @title Suricata 7 container + pcap-replay via tcpreplay (no NIC tap)
# @status accepted
# @rationale Deterministic CI-friendly test stand: tcpreplay feeds known pcap
#   fixtures into Suricata's pcap reader so eve.json output is reproducible
#   without requiring a physical NIC or host network promiscuous mode.
#   ET Open community rules baked at image build time; per-deploy rule
#   updates deferred to Phase 3.
#
# Required env vars (pass via .env or shell):
#   ANTHROPIC_API_KEY  — Claude API key for triage
#   SHAFERHUND_TOKEN   — optional; unset = localhost-only binding
#
# Usage:
#   cp .env.example .env && edit .env
#   docker compose up -d   (or: podman compose up -d)

services:
  wazuh.manager:
    image: wazuh/wazuh-manager:4.9.2
    hostname: wazuh.manager
    container_name: shaferhund-wazuh-manager
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -u $$API_USERNAME:$$API_PASSWORD -k -s -f -X POST https://localhost:55000/security/user/authenticate?raw=true -o /dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 655360
        hard: 655360
    ports:
      - "1514:1514"
      - "1515:1515"
      - "514:514/udp"
      - "55000:55000"
    environment:
      - WAZUH_NODE_NAME=manager
      - WAZUH_CLUSTER_NODES=wazuh.manager
      - WAZUH_CLUSTER_BIND_ADDR=wazuh.manager
      - API_USERNAME=wazuh-wui
      - API_PASSWORD=MyS3cr37P450r.*-
    volumes:
      - wazuh_api_configuration:/var/ossec/api/configuration
      - wazuh_etc:/var/ossec/etc
      - wazuh_logs:/var/ossec/logs
      - wazuh_queue:/var/ossec/queue
      - wazuh_var_multigroups:/var/ossec/var/multigroups

  suricata:
    # Build from docker/Dockerfile.suricata which extends jasonish/suricata:7.0
    # and bakes ET Open rules in at image build time via `suricata-update --no-test`.
    # @decision DEC-SURICATA-002 — see docker/Dockerfile.suricata for full rationale.
    build:
      context: .
      dockerfile: docker/Dockerfile.suricata
    container_name: shaferhund-suricata
    restart: unless-stopped
    # pcap-read mode (-r): processes the specified pcap file and writes
    # alerts to /var/log/suricata/eve.json.  No live NIC is tapped.
    # The -l flag sets the log directory.
    command: >
      -r /pcaps/${TCPREPLAY_PCAP:-malicious.pcap}
      -l /var/log/suricata/
    cap_add:
      - NET_ADMIN
      - SYS_NICE
    volumes:
      - suricata_logs:/var/log/suricata/
      - ./tests/pcap-fixtures:/pcaps:ro
    healthcheck:
      test: ["CMD-SHELL", "test -f /var/log/suricata/eve.json"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  tcpreplay:
    image: ghcr.io/appneta/tcpreplay:latest
    container_name: shaferhund-tcpreplay
    restart: "no"
    depends_on:
      suricata:
        condition: service_started
    environment:
      # Override TCPREPLAY_PCAP to replay a different fixture.
      # The value is a filename relative to /pcaps/ inside the container.
      - TCPREPLAY_PCAP=${TCPREPLAY_PCAP:-malicious.pcap}
    volumes:
      - ./tests/pcap-fixtures:/pcaps:ro
    # Replay the selected pcap file onto the loopback interface.
    # Suricata in this stack reads the pcap file directly via -r, so
    # tcpreplay is provided for environments where live-replay testing is
    # desired (e.g. running Suricata in af-packet mode during manual testing).
    entrypoint: >
      sh -c "tcpreplay --intf1=lo /pcaps/${TCPREPLAY_PCAP:-malicious.pcap} && echo '[tcpreplay] replay complete'"

  shaferhund-agent:
    build: .
    container_name: shaferhund-agent
    restart: unless-stopped
    depends_on:
      wazuh.manager:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - ALERTS_FILE=/var/ossec/logs/alerts/alerts.json
      - DB_PATH=/data/shaferhund.db
      - RULES_DIR=/rules
      - TRIAGE_HOURLY_BUDGET=20
      - SHAFERHUND_TOKEN=${SHAFERHUND_TOKEN:-}
    volumes:
      - wazuh_logs:/var/ossec/logs:ro
      - shaferhund_rules:/rules
      - shaferhund_data:/data
      - suricata_logs:/var/log/suricata:ro

volumes:
  wazuh_api_configuration:
  wazuh_etc:
  wazuh_logs:
  wazuh_queue:
  wazuh_var_multigroups:
  shaferhund_rules:
  shaferhund_data:
  suricata_logs:
