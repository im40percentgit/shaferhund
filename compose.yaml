# Shaferhund — Wazuh Manager + Alert Triage Agent + Suricata NIDS
# Wazuh 4.x Manager only (no OpenSearch, no indexer, no dashboard).
# Alerts written to mounted volume, tailed by shaferhund-agent.
# Suricata 7 runs in pcap-read mode fed by tcpreplay (no live NIC tap).
#
# @decision DEC-SURICATA-001
# @title Suricata 7 container + pcap-replay via tcpreplay (no NIC tap)
# @status accepted
# @rationale Deterministic CI-friendly test stand: tcpreplay feeds known pcap
#   fixtures into Suricata's pcap reader so eve.json output is reproducible
#   without requiring a physical NIC or host network promiscuous mode.
#   ET Open community rules baked at image build time; per-deploy rule
#   updates deferred to Phase 3.
#
# Required env vars (pass via .env or shell):
#   ANTHROPIC_API_KEY      — Claude API key for triage
#   SHAFERHUND_TOKEN       — optional; unset = localhost-only binding
#   WAZUH_API_USERNAME     — Wazuh REST API username (see .env.example)
#   WAZUH_API_PASSWORD     — Wazuh REST API password (see .env.example)
#
# Usage:
#   cp .env.example .env && edit .env
#   docker compose up -d   (or: podman compose up -d)

services:
  # @decision DEC-SECURITY-001
  # @title Wazuh manager ports bound to 127.0.0.1; API credentials via env vars
  # @status accepted
  # @rationale Binding to 0.0.0.0 (the Docker default) exposes the Wazuh REST
  #   API (55000), agent-registration (1514/1515), and syslog (514/udp) on every
  #   host interface. The default upstream password is publicly documented, so
  #   any reachable host can authenticate and gain full control of the detection
  #   pipeline. Loopback binding is safe for the default single-host deployment
  #   where shaferhund-agent talks to the Wazuh manager over the Docker bridge
  #   network (not via the host-side published port). Operators who run external
  #   Wazuh agents on separate machines MUST change the 127.0.0.1: prefix to
  #   their management interface IP (e.g. "10.0.0.1:1514:1514") in compose.yaml
  #   and set a strong WAZUH_API_PASSWORD in .env.
  wazuh.manager:
    image: wazuh/wazuh-manager:4.9.2
    hostname: wazuh.manager
    container_name: shaferhund-wazuh-manager
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -u $$API_USERNAME:$$API_PASSWORD -k -s -f -X POST https://localhost:55000/security/user/authenticate?raw=true -o /dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 655360
        hard: 655360
    ports:
      - "127.0.0.1:1514:1514"
      - "127.0.0.1:1515:1515"
      - "127.0.0.1:514:514/udp"
      - "127.0.0.1:55000:55000"
    environment:
      - WAZUH_NODE_NAME=manager
      - WAZUH_CLUSTER_NODES=wazuh.manager
      - WAZUH_CLUSTER_BIND_ADDR=wazuh.manager
      - API_USERNAME=${WAZUH_API_USERNAME}
      - API_PASSWORD=${WAZUH_API_PASSWORD}
    volumes:
      - wazuh_api_configuration:/var/ossec/api/configuration
      - wazuh_etc:/var/ossec/etc
      - wazuh_logs:/var/ossec/logs
      - wazuh_queue:/var/ossec/queue
      - wazuh_var_multigroups:/var/ossec/var/multigroups

  suricata:
    # Build from docker/Dockerfile.suricata which extends jasonish/suricata:7.0
    # and bakes ET Open rules in at image build time via `suricata-update --no-test`.
    # @decision DEC-SURICATA-002 — see docker/Dockerfile.suricata for full rationale.
    build:
      context: .
      dockerfile: docker/Dockerfile.suricata
    container_name: shaferhund-suricata
    restart: unless-stopped
    # pcap-read mode (-r): processes the specified pcap file and writes
    # alerts to /var/log/suricata/eve.json.  No live NIC is tapped.
    # The -l flag sets the log directory.
    command: >
      -r /pcaps/${TCPREPLAY_PCAP:-malicious.pcap}
      -l /var/log/suricata/
    cap_add:
      - NET_ADMIN
      - SYS_NICE
    volumes:
      - suricata_logs:/var/log/suricata/
      - ./tests/pcap-fixtures:/pcaps:ro
    healthcheck:
      test: ["CMD-SHELL", "test -f /var/log/suricata/eve.json"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  tcpreplay:
    image: ghcr.io/appneta/tcpreplay:latest
    container_name: shaferhund-tcpreplay
    restart: "no"
    depends_on:
      suricata:
        condition: service_started
    environment:
      # Override TCPREPLAY_PCAP to replay a different fixture.
      # The value is a filename relative to /pcaps/ inside the container.
      - TCPREPLAY_PCAP=${TCPREPLAY_PCAP:-malicious.pcap}
    volumes:
      - ./tests/pcap-fixtures:/pcaps:ro
    # Replay the selected pcap file onto the loopback interface.
    # Suricata in this stack reads the pcap file directly via -r, so
    # tcpreplay is provided for environments where live-replay testing is
    # desired (e.g. running Suricata in af-packet mode during manual testing).
    entrypoint: >
      sh -c "tcpreplay --intf1=lo /pcaps/${TCPREPLAY_PCAP:-malicious.pcap} && echo '[tcpreplay] replay complete'"

  shaferhund-agent:
    build: .
    container_name: shaferhund-agent
    restart: unless-stopped
    depends_on:
      wazuh.manager:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - ALERTS_FILE=/var/ossec/logs/alerts/alerts.json
      - DB_PATH=/data/shaferhund.db
      - RULES_DIR=/rules
      - TRIAGE_HOURLY_BUDGET=20
      - SHAFERHUND_TOKEN=${SHAFERHUND_TOKEN:-}
      - POSTURE_RUN_SCHEDULE_SECONDS=${POSTURE_RUN_SCHEDULE_SECONDS:-0}
      - REDTEAM_TARGET_CONTAINER=${REDTEAM_TARGET_CONTAINER:-redteam-target}
      - ART_TESTS_FILE=${ART_TESTS_FILE:-atomic_tests.yaml}
    volumes:
      - wazuh_logs:/var/ossec/logs:ro
      - shaferhund_rules:/rules
      - shaferhund_data:/data
      - suricata_logs:/var/log/suricata:ro

  # Phase 3 — Atomic Red Team target container (REQ-P0-P3-001, DEC-REDTEAM-001)
  # A minimal Ubuntu 22.04 host with a Wazuh agent installed. The Wazuh agent
  # is NOT enrolled at build time — enrollment happens at runtime via env var
  # or volume mount. ART commands are exec'd into this container by the
  # shaferhund-agent via `podman exec redteam-target /bin/bash -c <cmd>`.
  # The container runs indefinitely (tail -f /dev/null) so it is always ready
  # to receive exec calls from the harness without restart churn.
  #
  # Network: shares the default compose network so wazuh.manager can receive
  # agent registration from within the container, and shaferhund-agent can exec
  # commands into it via the container name.
  #
  # @decision DEC-REDTEAM-005
  # @title redteam-target as a long-running stub container, enrollment deferred
  # @status accepted
  # @rationale Phase 3 scope establishes the container shape and wires the
  #            harness. Wazuh agent enrollment (ossec-authd, agent.conf) is
  #            a Phase 3 integration step that requires a running Wazuh manager
  #            with a known registration key. Baking enrollment into the image
  #            would require build-time secrets. Instead, operators enroll after
  #            first `compose up` by exec-ing into the container and running
  #            `agent-auth -m wazuh.manager`. This matches the Wazuh 4.x
  #            recommended enrollment workflow.
  redteam-target:
    build:
      context: .
      dockerfile: docker/Dockerfile.redteam-target
    image: shaferhund-redteam-target:latest
    container_name: redteam-target
    restart: unless-stopped
    depends_on:
      - wazuh.manager
    # No ports exposed — the container is exec'd into by shaferhund-agent,
    # not reached via TCP from the host or external networks.
    entrypoint: ["/bin/bash", "-c", "tail -f /dev/null"]

volumes:
  wazuh_api_configuration:
  wazuh_etc:
  wazuh_logs:
  wazuh_queue:
  wazuh_var_multigroups:
  shaferhund_rules:
  shaferhund_data:
  suricata_logs:
